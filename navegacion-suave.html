<!DOCTYPE html>\n<html lang="es">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Navegación Suave</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        nav { position: fixed; top: 0; width: 100%; background: #333; color: white; padding: 10px; }\n        nav a { color: white; margin: 0 15px; text-decoration: none; }\n        section { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 2em; }\n        #section1 { background: #ff9999; }\n        #section2 { background: #99ff99; }\n        #section3 { background: #9999ff; }\n    </style>\n    <script>\n        document.addEventListener('DOMContentLoaded', function() {\n            const links = document.querySelectorAll('nav a');\n            links.forEach(link => {\n                link.addEventListener('click', function(e) {\n                    e.preventDefault();\n                    const targetId = this.getAttribute('href').substring(1);\n                    const targetElement = document.getElementById(targetId);\n                    targetElement.scrollIntoView({ behavior: 'smooth' });\n                });\n            });\n        });\n    </script>\n</head>\n<body>\n    <nav>\n        <a href="#section1">Sección 1</a>\n        <a href="#section2">Sección 2</a>\n        <a href="#section3">Sección 3</a>\n    </nav>\n    <section id="section1">\n        Contenido de la Sección 1\n    </section>\n    <section id="section2">\n        Contenido de la Sección 2\n    </section>\n    <section id="section3">\n        Contenido de la Sección 3\n    </section>\n</body>\n</html>
